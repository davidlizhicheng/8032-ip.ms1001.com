# 宝塔面板 Nginx 站点配置：ip.ms1001.com → Next.js (ip-card-ai)
# 用法：替换 /www/server/panel/vhost/nginx/ip.ms1001.com.conf
# 前提：PM2 已在 127.0.0.1:8032 运行
# 重载：nginx -t && nginx -s reload  （或在宝塔面板点「重载配置」）

server
{
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    listen [::]:443 ssl;
    listen [::]:443 quic;
    http2 on;
    http3 on;
    listen [::]:80;
    server_name ip.ms1001.com;

    # Next.js 由 Node 进程提供，不再走 PHP 站点根目录
    # root /www/wwwroot/ip.ms1001.com;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/ip.ms1001.com.conf;
    #CERT-APPLY-CHECK--END
    include /www/server/panel/vhost/nginx/extension/ip.ms1001.com/*.conf;

    #SSL-START
    #error_page 404/404.html;
    ssl_certificate    /www/server/panel/vhost/cert/ip.ms1001.com/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/ip.ms1001.com/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"; h3-27=":443";h3-25=":443"; h3-T050=":443"; h3-Q050=":443";h3-Q049=":443";h3-Q048=":443"; h3-Q046=":443"; h3-Q043=":443"';
    quic_retry on;
    quic_gso on;
    ssl_early_data on;
    error_page 497  https://$host$request_uri;
    #SSL-END

    #ERROR-PAGE-START
    # Next.js 自行处理 404，勿指向静态 404.html
    # error_page 404 /404.html;
    #ERROR-PAGE-END

    #PHP-INFO-START  Next.js 项目不需要 PHP
    # include enable-php-82.conf;
    #PHP-INFO-END

    #REWRITE-START
    # include /www/server/panel/vhost/rewrite/ip.ms1001.com.conf;
    #REWRITE-END

    # 上传限制（名片图片 / AI 生成）
    client_max_body_size 20m;

    # 本地上传图片：/uploads 与 /api/uploads 均从磁盘读取，缺失时回源 Next.js
    location ^~ /api/uploads/ {
        alias /www/wwwroot/ip.ms1001.com/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri @next_api_uploads;
    }
    location @next_api_uploads {
        proxy_pass http://127.0.0.1:8032;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        alias /www/wwwroot/ip.ms1001.com/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri @next_uploads;
    }
    location @next_uploads {
        proxy_pass http://127.0.0.1:8032;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 禁止访问敏感文件
    location ~* (\.user.ini|\.htaccess|\.htpasswd|\.env.*|\.project|\.bashrc|\.bash_profile|\.bash_logout|\.DS_Store|\.gitignore|\.gitattributes|LICENSE|README\.md|CLAUDE\.md|CHANGELOG\.md|CHANGELOG|CONTRIBUTING\.md|TODO\.md|FAQ\.md|composer\.json|composer\.lock|package(-lock)?\.json|yarn\.lock|pnpm-lock\.yaml|\.\w+~|\.swp|\.swo|\.bak(up)?|\.old|\.tmp|\.temp|\.log|\.sql(\.gz)?|docker-compose\.yml|docker\.env|Dockerfile|\.csproj|\.sln|Cargo\.toml|Cargo\.lock|go\.mod|go\.sum|phpunit\.xml|phpunit\.xml|pom\.xml|build\.gradl|pyproject\.toml|requirements\.txt|application(-\w+)?\.(ya?ml|properties))$
    {
        return 404;
    }

    # 禁止访问敏感目录
    location ~* /(\.git|\.svn|\.bzr|\.vscode|\.claude|\.idea|\.ssh|\.github|\.npm|\.yarn|\.pnpm|\.cache|\.husky|\.turbo|\.next|\.nuxt|node_modules|runtime)/ {
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }

    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    # ── Next.js 反向代理（核心）──
    location / {
        proxy_pass http://127.0.0.1:8032;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # WebSocket（Next.js 热更新 / 部分 API）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        proxy_buffering off;
        proxy_cache off;
    }

    access_log  /www/wwwlogs/ip.ms1001.com.log;
    error_log   /www/wwwlogs/ip.ms1001.com.error.log;
}

# WebSocket Connection 映射（放在 http {} 块内，若已有则勿重复）
